<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AtHand</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #262626;
      --bg-input: #2e2e2e;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --text-placeholder: #555555;
      --accent: #ffffff;
      --accent-hover: #cccccc;
      --border: #333333;
      --error: #ff6b6b;
      --success: #6bcb77;
      --border-radius: 14px;
      --window-width: 640px;
      --search-height: 52px;
      --answer-height: 400px;
      --margin: 8px;
    }

    body {
      font-family: "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
      color: var(--text-primary);
      overflow: hidden;
      user-select: none;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--margin);
    }

    .container {
      width: var(--window-width);
      background: rgba(26, 26, 26, 0.95);
      border: 1px solid var(--border);
      border-radius: var(--border-radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      transition: height 0.2s ease;
    }

    .search-bar {
      display: flex;
      align-items: center;
      height: var(--search-height);
      padding: 0 16px;
      border-bottom: 1px solid transparent;
    }

    .search-bar.has-answer {
      border-bottom-color: var(--border);
    }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid transparent;
      color: var(--text-primary);
      font-size: 18px;
      font-family: inherit;
      padding: 14px 0;
      outline: none;
    }

    #search-input::placeholder {
      color: var(--text-placeholder);
    }

    #search-input:focus {
      border-bottom-color: var(--text-secondary);
    }

    #settings-btn {
      width: 40px;
      height: 40px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    #settings-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
    }

    .answer-panel {
      max-height: var(--answer-height);
      overflow-y: auto;
      display: none;
    }

    .answer-panel.visible {
      display: block;
    }

    .answer-content {
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
    }

    .user-message {
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      margin: 14px 0 2px 0;
      font-size: 13px;
      letter-spacing: 0.02em;
      padding-left: 10px;
      border-left: 2px solid rgba(255, 255, 255, 0.3);
    }

    .user-message:first-child {
      margin-top: 0;
    }

    .assistant-message {
      margin: 8px 0 16px 0;
    }

    .assistant-message pre {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 10px 14px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
    }

    .assistant-message code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 13px;
    }

    .assistant-message pre code {
      background: transparent;
      padding: 0;
    }

    .assistant-message p {
      margin: 6px 0;
    }

    .assistant-message ul, .assistant-message ol {
      margin: 6px 0;
      padding-left: 20px;
    }

    .assistant-message blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 8px 0;
      color: var(--text-secondary);
    }

    .assistant-message table {
      border-collapse: collapse;
      margin: 8px 0;
      width: 100%;
    }

    .assistant-message th, .assistant-message td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }

    .assistant-message th {
      background: rgba(255, 255, 255, 0.06);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 16px 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-thinking {
      color: var(--accent);
    }

    .status-error {
      color: var(--error);
    }

    .status-success {
      color: var(--success);
    }

    /* Settings Dialog */
    .settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .settings-overlay.visible {
      display: flex;
    }

    .settings-dialog {
      width: 460px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--border-radius);
      padding: 28px;
    }

    .settings-title {
      font-size: 22px;
      font-weight: bold;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .settings-section {
      margin-bottom: 20px;
    }

    .settings-section-title {
      font-size: 15px;
      font-weight: bold;
      color: var(--text-primary);
      margin-bottom: 10px;
      padding-top: 8px;
    }

    .settings-divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    .settings-input {
      width: 100%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text-primary);
      margin-bottom: 8px;
      font-family: inherit;
    }

    .settings-input:focus {
      outline: none;
      border-color: var(--text-secondary);
    }

    .settings-row {
      display: flex;
      gap: 8px;
    }

    .settings-row .settings-input {
      flex: 1;
    }

    .settings-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .settings-btn:hover {
      color: var(--text-primary);
    }

    .settings-btn-primary {
      background: var(--text-primary);
      color: var(--bg-primary);
      border: none;
      font-weight: bold;
      padding: 10px 28px;
    }

    .settings-btn-primary:hover {
      background: var(--accent-hover);
    }

    .settings-btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      padding: 10px 28px;
    }

    .settings-btn-secondary:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .settings-btn-test {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--text-secondary);
      padding: 8px 20px;
    }

    .settings-btn-test:hover {
      background: var(--text-primary);
      color: var(--bg-primary);
    }

    .settings-slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .settings-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    .settings-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--text-primary);
      border-radius: 50%;
      cursor: pointer;
    }

    .settings-slider-value {
      width: 32px;
      text-align: center;
      color: var(--text-primary);
      font-size: 14px;
    }

    .settings-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    .test-result {
      font-size: 13px;
      margin-top: 8px;
    }

    .katex-display {
      margin: 10px 0;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container" id="container">
      <div class="search-bar" id="search-bar">
        <input type="text" id="search-input" placeholder="Ask anything..." autocomplete="off" />
        <button id="settings-btn">⋯</button>
      </div>
      <div class="answer-panel" id="answer-panel">
        <div class="answer-content" id="answer-content"></div>
        <div class="status-bar">
          <span id="status-text"></span>
          <span id="hint-text">Esc 关闭</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Dialog -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-dialog">
      <div class="settings-title">Settings</div>
      <div class="settings-divider"></div>
      
      <div class="settings-section">
        <div class="settings-section-title">API 连接</div>
        <input type="text" class="settings-input" id="api-base" placeholder="https://api.openai.com/v1" />
        <div class="settings-row">
          <input type="password" class="settings-input" id="api-key" placeholder="sk-..." />
          <button class="settings-btn" id="toggle-key">Show</button>
        </div>
        <input type="text" class="settings-input" id="model" placeholder="gpt-4o-mini" list="models" />
        <datalist id="models">
          <option value="gpt-4o-mini">
          <option value="gpt-4o">
          <option value="gpt-4-turbo">
          <option value="gpt-3.5-turbo">
          <option value="claude-sonnet-4-5-20250929">
          <option value="deepseek/deepseek-chat">
          <option value="Qwen/Qwen2.5-72B-Instruct">
          <option value="Qwen/Qwen2.5-7B-Instruct">
        </datalist>
        <div class="settings-row" style="margin-top: 10px;">
          <button class="settings-btn settings-btn-test" id="test-btn">Test Connection</button>
          <span class="test-result" id="test-result"></span>
        </div>
      </div>

      <div class="settings-divider"></div>

      <div class="settings-section">
        <div class="settings-section-title">模型参数</div>
        <div class="settings-slider-container">
          <label style="width: 90px; color: var(--text-secondary); font-size: 13px;">Temperature</label>
          <input type="range" class="settings-slider" id="temperature" min="0" max="20" value="7" />
          <span class="settings-slider-value" id="temp-value">0.7</span>
        </div>
        <div class="settings-row" style="margin-top: 12px;">
          <label style="width: 90px; color: var(--text-secondary); font-size: 13px;">Max Tokens</label>
          <input type="number" class="settings-input" id="max-tokens" min="256" max="32768" step="256" value="4096" style="flex: 1; margin: 0;" />
        </div>
      </div>

      <div class="settings-buttons">
        <button class="settings-btn settings-btn-secondary" id="cancel-btn">Cancel</button>
        <button class="settings-btn settings-btn-primary" id="save-btn">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
